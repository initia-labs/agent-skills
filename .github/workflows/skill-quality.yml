name: Skill Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_VERSION: "0.10.0"
      SHELLCHECK_SHA256: "6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shellcheck
        run: |
          curl -fsSL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  /tmp/shellcheck.tar.xz" | sha256sum --check --
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install -m 0755 "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skill/scripts/requirements.txt

      - name: Lint shell scripts
        run: ./scripts/lint-shell.sh

      - name: Run skill quality checks
        run: ./scripts/ci-check.sh
